<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>KUKA Arm Prototype</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

        body {
            margin: 0;
            overflow: hidden;
            background: #eaedf2;
            font-family: 'Orbitron', sans-serif;
        }

        canvas {
            display: block;
        }

        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #333;
            font-size: 14px;
            pointer-events: none;
        }
    </style>
</head>

<body>
    <div id="info">Mueve el ratón para controlar el brazo KUKA Prototype.<br>El diseño simula un robot industrial KUKA
        KR Quantec real sobre un séptimo eje (riel lineal).</div>
    <canvas id="cv"></canvas>

    <script>
        const cv = document.getElementById('cv');
        const ctx = cv.getContext('2d');
        let W, H;
        const mouse = { x: window.innerWidth / 2, y: window.innerHeight / 2 };

        window.addEventListener('resize', () => { W = cv.width = innerWidth; H = cv.height = innerHeight; });
        window.dispatchEvent(new Event('resize'));

        document.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });

        // Utils
        const clamp = (v, min, max) => Math.max(min, Math.min(max, v));
        const rrect = (c, x, y, w, h, r) => {
            c.beginPath(); c.moveTo(x + w - r, y); c.arcTo(x + w, y, x + w, y + h, r); c.arcTo(x + w, y + h, x, y + h, r);
            c.arcTo(x, y + h, x, y, r); c.arcTo(x, y, x + w, y, r); c.closePath();
        };

        // KUKA Colors
        const KUKA_ORANGE = '#f56300';
        const KUKA_ORANGE_DARK = '#cc5200';
        const KUKA_ORANGE_LIGHT = '#ff822a';
        const KUKA_BLACK = '#1a1a1a';
        const KUKA_GREY = '#444444';
        const SILVER = '#d0d4d8';

        class RealisticKukaArm {
            constructor() {
                this.L1 = Math.min(window.innerWidth, window.innerHeight) * 0.22;
                this.L2 = Math.min(window.innerWidth, window.innerHeight) * 0.18;
                this.by = window.innerHeight * 0.8;
                this.bx = window.innerWidth / 2;
                this.th1 = -Math.PI / 2;
                this.th2 = 0;
                this.th3 = 0; 
                this.linkLen = 18;
                
                this.chainN = Math.ceil((window.innerWidth * 0.72) / this.linkLen);
                this.chain = [];
                this.initChain();
            }

            initChain() {
                this.chain = [];
                const anchorX = window.innerWidth * 0.05 + 10; 
                const anchorY = this.by + 65;
                const carriageW = 160;
                const carX = this.bx - (carriageW / 2);
                const carY = this.by - 25;
                
                const dx = anchorX - carX;
                const dy = anchorY - carY;
                const dist = Math.hypot(dx, dy);
                
                for(let i=0; i<this.chainN; i++) {
                    let t = i / (this.chainN - 1 || 1);
                    let sag = Math.sin(t * Math.PI) * (this.chainN * this.linkLen - dist) * 0.3;
                    let nx = carX + t * dx;
                    let ny = carY + t * dy + sag;
                    if (ny > anchorY - 10) ny = anchorY - 10;
                    this.chain.push({x: nx, y: ny, a: 0});
                }
            }

            ik(tx, ty) {
                this.L1 = Math.min(window.innerWidth, window.innerHeight) * 0.22;
                this.L2 = Math.min(window.innerWidth, window.innerHeight) * 0.18;
                this.by = window.innerHeight * 0.8;
                const newChainN = Math.ceil((window.innerWidth * 0.72) / this.linkLen);
                
                if (newChainN !== this.chainN) {
                    this.chainN = newChainN;
                    this.initChain();
                }

                const idealBx = clamp(tx, window.innerWidth * 0.1, window.innerWidth * 0.9);
                this.bx += (idealBx - this.bx) * 0.08;

                const TOOL_LENGTH = 90;
                const effective_L2 = this.L2 + TOOL_LENGTH;

                const dx = tx - (this.bx + 55);
                const dy = ty - (this.by - 110);
                const d = Math.hypot(dx, dy);

                const mx = this.L1 + effective_L2 - 2;
                const mn = Math.abs(this.L1 - effective_L2) + 2;
                const r = clamp(d, mn, mx);

                const sx = d > 0 ? (dx / d) * r : 0;
                const sy = d > 0 ? (dy / d) * r : -r;

                const c2 = (r * r - this.L1 * this.L1 - effective_L2 * effective_L2) / (2 * this.L1 * effective_L2);
                const th2Target = -Math.acos(clamp(c2, -1, 1));

                const k1 = this.L1 + effective_L2 * Math.cos(th2Target);
                const k2 = effective_L2 * Math.sin(th2Target);
                const th1Target = Math.atan2(sy, sx) - Math.atan2(k2, k1);

                this.th1 += (th1Target - this.th1) * 0.12;
                this.th2 += (th2Target - this.th2) * 0.12;
                
                // Track tool tip direction for th3
                const ex = (this.bx + 55) + Math.cos(this.th1) * this.L1;
                const ey = (this.by - 110) + Math.sin(this.th1) * this.L1;
                const wx = ex + Math.cos(this.th1 + this.th2) * this.L2;
                const wy = ey + Math.sin(this.th1 + this.th2) * this.L2;
                const toolTarget = Math.atan2(ty - wy, tx - wx);
                const th3Target = toolTarget - (this.th1 + this.th2);
                this.th3 += (th3Target - this.th3) * 0.2;

                this.updateDragChain();
            }

            updateDragChain() {
                // FIXED LEFT SIDE WALL ANCHOR
                const anchorX = window.innerWidth * 0.05 + 10; 
                const anchorY = this.by + 65;
                
                // MOVING CARRIAGE LEFT SIDE ANCHOR
                const carriageW = 160;
                const carX = this.bx - (carriageW / 2);
                const carY = this.by - 25;
                
                // PURE POSITIONAL CONSTRAINT (FABRIK)
                const maxBend = 25 * (Math.PI / 180);
                
                // Add soft sag to all unconstrained links
                for (let i = 1; i < this.chainN - 1; i++) {
                    this.chain[i].y += 3; 
                }
                
                for (let iter = 0; iter < 15; iter++) {
                    // Backwards pass: Fixed Wall to Robot
                    this.chain[this.chainN - 1].x = anchorX;
                    this.chain[this.chainN - 1].y = anchorY;
                    for (let i = this.chainN - 2; i >= 0; i--) {
                        let p1 = this.chain[i+1];
                        let p2 = this.chain[i];
                        let dx = p2.x - p1.x;
                        let dy = p2.y - p1.y;
                        let dist = Math.hypot(dx, dy);
                        if (dist > 0) {
                            p2.x = p1.x + (dx/dist) * this.linkLen;
                            p2.y = p1.y + (dy/dist) * this.linkLen;
                        }
                    }
                    
                    // Forwards pass (Robot to Wall) with angle limit ±25°
                    this.chain[0].x = carX;
                    this.chain[0].y = carY;
                    for (let i = 0; i < this.chainN - 1; i++) {
                        let p1 = this.chain[i];
                        let p2 = this.chain[i+1];
                        let dx = p2.x - p1.x;
                        let dy = p2.y - p1.y;
                        
                        let ang = Math.atan2(dy, dx);
                        
                        if (i > 0) {
                            let prevA = this.chain[i-1].a;
                            let delta = ang - prevA;
                            while (delta > Math.PI) delta -= Math.PI * 2;
                            while (delta < -Math.PI) delta += Math.PI * 2;
                            
                            if (delta > maxBend) ang = prevA + maxBend;
                            if (delta < -maxBend) ang = prevA - maxBend;
                        } else {
                            // Initial link drop tendency checking
                            if (ang < 0 && ang > -Math.PI) {
                                // Encourage pointing initially down-ish not up-ish
                                if (ang > -Math.PI/4) ang = -Math.PI/4;
                            }
                        }
                        
                        this.chain[i].a = ang;
                        p2.x = p1.x + Math.cos(ang) * this.linkLen;
                        p2.y = p1.y + Math.sin(ang) * this.linkLen;
                        
                        // Enforce absolute floor 
                        if (p2.y > anchorY - 10) {
                            p2.y = anchorY - 10;
                        }
                    }
                }
                
                // Final angle compute for drawing
                for (let i = 0; i < this.chainN - 1; i++) {
                    this.chain[i].a = Math.atan2(this.chain[i+1].y - this.chain[i].y, this.chain[i+1].x - this.chain[i].x);
                }
                this.chain[this.chainN-1].a = this.chain[this.chainN-2].a;
            }

            drawDragChain(c) {
                c.save();
                for (let i = 0; i < this.chainN; i++) {
                    c.save();
                    c.translate(this.chain[i].x, this.chain[i].y);
                    c.rotate(this.chain[i].a);
                    
                    c.fillStyle = '#1c1c1c';
                    rrect(c, 0, -12, this.linkLen, 24, 3);
                    c.fill();
                    c.fillStyle = '#666'; // edge highlight
                    c.fillRect(1, -11, this.linkLen - 2, 2);
                    c.fillStyle = '#0a0a0a'; // side details
                    c.fillRect(this.linkLen/2 - 2, -6, 4, 12);
                    c.restore();
                }
                c.restore();
            }

            drawLinearRail(c) {
                const railW = window.innerWidth * 0.9;
                const railH = 70;
                const rx = window.innerWidth * 0.05;
                const ry = this.by;

                c.fillStyle = '#2d2f33'; 
                c.fillRect(rx, ry, railW, railH);

                c.fillStyle = '#a0a5ad';
                c.fillRect(rx, ry + 15, railW, 8);
                c.fillRect(rx, ry + 40, railW, 20);

                c.fillStyle = '#444';
                for (let i = rx + 20; i < rx + railW - 20; i += 40) {
                    c.beginPath(); c.arc(i, ry + 50, 4, 0, Math.PI * 2); c.fill();
                }
            }

            drawCarriage(c) {
                const ry = this.by;
                const carriageW = 160;
                const cx = this.bx;

                c.save();
                
                // Main dark sliding block
                c.fillStyle = '#111';
                c.fillRect(cx - (carriageW/2), ry - 15, carriageW, 35);
                
                // Orange matching left/right endplates
                c.fillStyle = KUKA_ORANGE;
                rrect(c, cx - (carriageW/2) - 10, ry - 15, 20, 35, 4); c.fill();
                rrect(c, cx + (carriageW/2) - 10, ry - 15, 20, 35, 4); c.fill();
                
                // Front and Back connection housings
                c.fillStyle = '#222';
                c.fillRect(cx - (carriageW/2) - 10, ry - 5, 25, 20); 
                c.fillRect(cx + (carriageW/2) - 15, ry - 5, 25, 20); 

                // Dark Cylinder Turntable base extending slightly upward
                c.fillStyle = KUKA_BLACK;
                const turnRadius = carriageW * 0.28;
                c.beginPath(); 
                c.moveTo(cx - turnRadius, ry - 15);
                c.lineTo(cx + turnRadius, ry - 15);
                c.lineTo(cx + turnRadius - 10, ry - 100);
                c.lineTo(cx - turnRadius + 10, ry - 100);
                c.fill();

                // Turntable shadowing
                const grd = c.createLinearGradient(cx - turnRadius, 0, cx + turnRadius, 0);
                grd.addColorStop(0, 'rgba(255,255,255,0.05)');
                grd.addColorStop(0.3, 'rgba(255,255,255,0.15)');
                grd.addColorStop(0.7, 'rgba(0,0,0,0.4)');
                grd.addColorStop(1, 'rgba(0,0,0,0.8)');
                c.fillStyle = grd;
                c.fill();

                // Small rotating orange shoulder mount offset to the right slightly
                c.fillStyle = KUKA_ORANGE_DARK;
                rrect(c, cx + 55 - 45, ry - 120, 90, 25, 6);
                c.fill();
                
                c.restore();
            }

            drawMotorDisc(c, x, y, outerR, innerR, isFront, ang) {
                if (x < -100 || x > window.innerWidth + 100 || y < -100 || y > window.innerHeight + 100) return;
                c.save();
                c.translate(x, y);
                // Base shadow exterior ring
                c.beginPath(); c.arc(0, 0, outerR, 0, Math.PI * 2);
                c.fillStyle = '#1a1a1a'; c.fill();
                
                if (innerR > 0) {
                    c.beginPath(); c.arc(0, 0, innerR, 0, Math.PI * 2);
                    c.fillStyle = '#FF6600'; c.fill();

                    c.beginPath(); c.arc(0, 0, innerR * 0.7, 0, Math.PI * 2);
                    c.fillStyle = '#1a1a1a'; c.fill();
                    c.strokeStyle = '#222'; c.lineWidth = 1; c.stroke();
                }

                if (isFront) {
                    c.rotate(ang);
                    c.fillStyle = '#444';
                    for (let i = 0; i < 6; i++) {
                        const a = (i / 6) * Math.PI * 2;
                        c.beginPath(); 
                        c.arc(Math.cos(a) * outerR * 0.6, Math.sin(a) * outerR * 0.6, outerR * 0.08, 0, Math.PI * 2); 
                        c.fill();
                    }
                    // Bright white rotation indicator
                    c.fillStyle = '#fff';
                    c.fillRect(0, -1.5, outerR * 0.7, 3);
                }
                c.restore();
            }

            drawShoulderJoint(c, x, y, segW, ang) {
                // Stack of 3 discs with 3px total offset
                this.drawMotorDisc(c, x - 3, y + 2, segW * 0.75, 0, false, ang);
                this.drawMotorDisc(c, x - 1, y + 0.5, segW * 0.65, 0, false, ang);
                this.drawMotorDisc(c, x, y, segW * 0.55, segW * 0.45, true, ang);
            }

            drawElbowJoint(c, x, y, segW, ang) {
                // Stack of 2 discs
                this.drawMotorDisc(c, x - 2, y + 1, segW * 0.65, 0, false, ang);
                this.drawMotorDisc(c, x, y, segW * 0.48, segW * 0.4, true, ang);
            }

            drawWristJoint(c, x, y, segW, ang) {
                // Single small disc
                this.drawMotorDisc(c, x, y, segW * 0.42, segW * 0.35, true, ang);
            }

            drawElbowMotors(c, x, y, ang) {
                if (x < -100 || x > window.innerWidth + 100 || y < -100 || y > window.innerHeight + 100) return;
                c.save();
                c.translate(x, y);
                c.rotate(ang + Math.PI); 

                // Backplate BEHIND logo
                c.fillStyle = KUKA_ORANGE_DARK;
                c.fillRect(-15, -45, 30, 90);

                // Extended black engine modules clamped to 18% size max (45px)
                c.fillStyle = '#151515';
                for (let m = 0; m < 3; m++) {
                    rrect(c, 15, -40 + m * 30, 45, 20, 4);
                }
                c.fill();
                c.restore();
            }

            drawArmQuad(c, x, y, len, ang, startW, endW, isL1) {
                if (x < -300 || x > window.innerWidth + 300 || y < -300 || y > window.innerHeight + 300) return;
                c.save();
                c.translate(x, y); c.rotate(ang);

                // Main Orange Center Trapezoid
                c.beginPath();
                c.moveTo(0, -startW / 2);
                c.lineTo(len, -endW / 2);
                c.lineTo(len, endW / 2);
                c.lineTo(0, startW / 2);
                c.closePath();
                c.fillStyle = '#FF6600';
                c.fill();
                
                // Highlight Trim (Top Edge Polygon)
                c.beginPath();
                c.moveTo(0, -startW / 2);
                c.lineTo(len, -endW / 2);
                c.lineTo(len, -endW / 2 + 8);
                c.lineTo(0, -startW / 2 + 8);
                c.closePath();
                c.fillStyle = '#ff8833';
                c.fill();

                // Shadow Trim (Bottom Edge Polygon)
                c.beginPath();
                c.moveTo(0, startW / 2);
                c.lineTo(len, endW / 2);
                c.lineTo(len, endW / 2 - 12);
                c.lineTo(0, startW / 2 - 12);
                c.closePath();
                c.fillStyle = '#cc4400';
                c.fill();

                c.strokeStyle = '#1a1a1a'; c.lineWidth = 2; c.stroke();

                if (isL1) {
                    // Recessed panel inside the Upper Arm
                    c.fillStyle = '#1a1a1a';
                    c.beginPath();
                    c.moveTo(len * 0.1, -startW * 0.2);
                    c.lineTo(len * 0.9, -endW * 0.2);
                    c.lineTo(len * 0.9, endW * 0.2);
                    c.lineTo(len * 0.1, startW * 0.2);
                    c.closePath();
                    c.fill();
                } else {
                    // ING.CESAR Logo accurately angled on Forearm tube
                    c.save();
                    c.fillStyle = '#111';
                    c.font = `900 ${endW * 0.45}px 'Orbitron', sans-serif`;
                    c.textAlign = 'center'; c.textBaseline = 'middle';
                    c.fillText("ING.CESAR", len * 0.5, 0);
                    c.restore();
                }

                c.restore();
            }

            drawWristAndTorch(c, x, y, ang) {
                if (x < -100 || x > window.innerWidth + 100 || y < -100 || y > window.innerHeight + 100) return;
                c.save();
                c.translate(x, y); c.rotate(ang); 

                // Compact base box matching end effector scale
                c.fillStyle = '#111';
                rrect(c, -5, -15, 30, 30, 4);
                c.fill();

                c.fillStyle = '#888';
                rrect(c, 25, -10, 25, 20, 2);
                c.fill();

                // Torch nozzle
                c.fillStyle = '#222';
                c.beginPath(); c.moveTo(50, -8); c.lineTo(75, -3); c.lineTo(75, 3); c.lineTo(50, 8); c.fill();

                // Copper tip
                c.fillStyle = '#b87333';
                c.fillRect(75, -2, 5, 4); 

                c.restore();
            }

            drawDynamicCables(c, cx, cy, ex, ey, wx, wy, th1, th2) {
                if (cx < -200 || cx > window.innerWidth + 200) return;
                c.save();
                c.lineCap = 'round';
                c.lineJoin = 'round';

                const cableW = 14;

                c.strokeStyle = '#151515';
                c.lineWidth = cableW;

                c.beginPath();
                const start1X = this.bx - 40;
                const start1Y = this.by - 90;
                const entry1X = cx + Math.cos(th1 - Math.PI) * 20;
                const entry1Y = cy + Math.sin(th1 - Math.PI) * 20;

                c.moveTo(start1X, start1Y);
                c.quadraticCurveTo(cx - 50, cy, entry1X, entry1Y);
                c.stroke();

                c.beginPath();
                const exit1X = ex - Math.cos(th1) * 30;
                const exit1Y = ey - Math.sin(th1) * 30;
                const end1X = ex + Math.cos(th1 + Math.PI - 0.2) * 50;
                const end1Y = ey + Math.sin(th1 + Math.PI - 0.2) * 50;

                c.moveTo(exit1X, exit1Y);
                c.quadraticCurveTo(ex - Math.cos(th1) * 80, ey - Math.sin(th1) * 80, end1X, end1Y);
                c.stroke();

                // Detailed Corrugated Hosing Pass
                c.strokeStyle = '#2a2a2a';
                c.lineWidth = cableW;
                c.setLineDash([4, 6]);
                c.beginPath(); c.moveTo(start1X, start1Y); c.quadraticCurveTo(cx - 50, cy, entry1X, entry1Y); c.stroke();
                c.beginPath(); c.moveTo(exit1X, exit1Y); c.quadraticCurveTo(ex - Math.cos(th1) * 80, ey - Math.sin(th1) * 80, end1X, end1Y); c.stroke();

                c.setLineDash([]);
                c.strokeStyle = '#151515';
                c.lineWidth = cableW - 2;
                c.beginPath();

                const end2X = wx - Math.cos(th1 + th2) * 30;
                const end2Y = wy - Math.sin(th1 + th2) * 30;

                const cp2_1X = ex + Math.cos(th1 + th2 - Math.PI / 2) * 80;
                const cp2_1Y = ey + Math.sin(th1 + th2 - Math.PI / 2) * 80;

                const cp2_2X = ex + (wx - ex) * 0.5 + Math.cos(th1 + th2 - Math.PI / 2) * 40;
                const cp2_2Y = ey + (wy - ey) * 0.5 + Math.sin(th1 + th2 - Math.PI / 2) * 40;

                c.moveTo(end1X, end1Y);
                c.bezierCurveTo(cp2_1X, cp2_1Y, cp2_2X, cp2_2Y, end2X, end2Y);
                c.stroke();

                c.strokeStyle = '#2a2a2a';
                c.setLineDash([3, 5]);
                c.stroke();

                c.restore();
            }

            drawControlCabinet(c) {
                const boxW = 210;
                const boxH = 150;
                const cabinetX = window.innerWidth * 0.05 + 10; 
                const cabinetY = this.by + 65 - boxH;

                c.save();
                // Outer Shell (Dark Graphite)
                c.fillStyle = '#2a2a2a';
                rrect(c, cabinetX, cabinetY, boxW, boxH, 4);
                c.fill();

                // Bright Orange Door
                c.fillStyle = '#FF6600';
                const panelX = cabinetX + 35; 
                const panelY = cabinetY + 5;
                const panelW = boxW - 40;
                const panelH = boxH - 20;
                c.fillRect(panelX, panelY, panelW, panelH);

                // LED Recess Plate
                c.fillStyle = '#111';
                c.fillRect(panelX + 20, panelY + 15, 60, 25);
                c.fillStyle = '#ff3333'; c.beginPath(); c.arc(panelX + 30, panelY + 27, 3, 0, Math.PI*2); c.fill(); // Red LED
                c.fillStyle = '#ffcc00'; c.beginPath(); c.arc(panelX + 45, panelY + 27, 3, 0, Math.PI*2); c.fill(); // Yellow LED
                c.fillStyle = '#33cc33'; c.beginPath(); c.arc(panelX + 60, panelY + 27, 3, 0, Math.PI*2); c.fill(); // Green LED

                // Switch Breaker Bar
                c.fillStyle = '#111';
                rrect(c, panelX + 7, panelY + 70, 12, 45, 2);
                c.fill();

                // 'KUKA' Main Door Font Tracking Text (Bottom)
                c.fillStyle = '#111';
                c.font = '900 30px "Orbitron", sans-serif';
                c.textAlign = 'left';
                c.textBaseline = 'alphabetic';
                c.fillText("KUKA", panelX + 30, panelY + panelH - 15);

                // KR C4 Plate Label (CE Marking zone)
                c.fillStyle = '#fff';
                c.strokeStyle = '#000'; c.lineWidth = 1;
                c.fillRect(panelX + 115, panelY + 68, 45, 25);
                c.strokeRect(panelX + 115, panelY + 68, 45, 25);
                c.fillStyle = '#000';
                c.font = 'bold 9px sans-serif'; c.textAlign = 'center'; c.textBaseline = 'alphabetic';
                c.fillText("KUKA", panelX + 137, panelY + 79);
                c.font = '7px sans-serif';
                c.fillText("KR C4", panelX + 137, panelY + 89);

                // Hazard Warning Triangle EXACT specs (Solid yellow, 2px borders)
                const triX = panelX + 138;
                const triY = panelY + 38;
                c.fillStyle = '#FFD700';
                c.strokeStyle = '#000'; c.lineWidth = 2; c.lineJoin = 'miter';
                c.beginPath();
                c.moveTo(triX, triY - 18);
                c.lineTo(triX + 20, triY + 14);
                c.lineTo(triX - 20, triY + 14);
                c.closePath();
                c.fill(); c.stroke();
                c.fillStyle = '#000';
                c.font = 'bold 22px sans-serif';
                c.textAlign = 'center';
                c.textBaseline = 'middle';
                c.fillText("!", triX, triY + 4);

                // Hook Area Bottom-Right Add-on for SmartPAD
                c.fillStyle = '#111';
                c.beginPath(); 
                c.moveTo(panelX + panelW - 5, panelY + panelH - 60);
                c.lineTo(panelX + panelW + 15, panelY + panelH - 60);
                c.lineTo(panelX + panelW + 15, panelY + panelH - 10);
                c.lineTo(panelX + panelW - 5, panelY + panelH - 10);
                c.fill();

                // Teach Pendant Overlay Details (Hooked Bottom Right)
                c.translate(cabinetX + boxW - 5, cabinetY + boxH - 60);
                c.rotate(Math.PI / 16);
                c.fillStyle = '#333';
                rrect(c, -20, 0, 50, 65, 8); c.fill();
                c.fillStyle = '#222';
                rrect(c, -18, 2, 46, 61, 6); c.fill();
                c.fillStyle = KUKA_ORANGE;
                c.fillRect(-16, 4, 42, 57);
                c.fillStyle = '#eee';
                c.fillRect(-12, 15, 34, 35);
                c.fillStyle = '#111';
                c.beginPath(); c.arc(15, 8, 5, 0, Math.PI*2); c.fill(); 
                c.fillStyle = 'red';
                c.beginPath(); c.arc(15, 8, 3.5, 0, Math.PI*2); c.fill();

                c.restore();
            }

            draw(c) {
                // FIXED Z-ORDER SEQUENCE 1 TO 9 
                
                // 1. Static base rail rendering
                this.drawLinearRail(c);
                
                // 1.5 Drag chain rendering BEFORE the base column (Overlaid on floor rails, behind base)
                this.drawDragChain(c);

                // 2. Base column / Turret
                this.drawCarriage(c);

                const cx = this.bx + 55;
                const cy = this.by - 110; 
                const ex = cx + Math.cos(this.th1) * this.L1;
                const ey = cy + Math.sin(this.th1) * this.L1;
                const wx = ex + Math.cos(this.th1 + this.th2) * this.L2;
                const wy = ey + Math.sin(this.th1 + this.th2) * this.L2;
                
                const segW = 55; // Universal segment thickness variable

                // 2B. J1: Shoulder Joint - Rendered BEHIND upper arm as a 3D separated stack
                this.drawShoulderJoint(c, cx, cy, segW, this.th1);

                // 3. Upper arm segment L1 (Thick solid orange block no-taper covering Elbow backplates)
                this.drawElbowMotors(c, ex, ey, this.th1 + this.th2); // Motor protrusion Behind L2
                this.drawArmQuad(c, cx, cy, this.L1, this.th1, segW * 1.0, segW * 1.0, true);

                // 4. J2: Elbow Joint - ON TOP of L1, BEHIND L2 Forearm (2 disc stack)
                this.drawElbowJoint(c, ex, ey, segW, this.th1 + this.th2);

                // 5. Forearm segment (Thinner L2 with logo)
                this.drawArmQuad(c, ex, ey, this.L2, this.th1 + this.th2, segW * 0.8, segW * 0.55, false);

                // 6. J3: Wrist Joint - ON TOP of Forearm (th3 precise indicator scale 0.42)
                this.drawWristJoint(c, wx, wy, segW, this.th1 + this.th2 + this.th3);

                // 7. Tool / end effector (Unobscured on top of wrist - cleaned up stray floats)
                this.drawWristAndTorch(c, wx, wy, this.th1 + this.th2 + this.th3);

                // 8. Corrugated cables mapped over the finished architecture layout
                this.drawDynamicCables(c, cx, cy, ex, ey, wx, wy, this.th1, this.th2);
                
                // 9. KR C4 Control Cabinet foreground rendering absolute highest z-index priority
                this.drawControlCabinet(c);
            }
        }

        const arm = new RealisticKukaArm();

        function animate() {
            ctx.clearRect(0, 0, W, H);

            // Grid background to give scale
            ctx.strokeStyle = '#dae0e8'; ctx.lineWidth = 1;
            for (let x = 0; x < W; x += 50) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
            for (let y = 0; y < H; y += 50) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }

            arm.ik(mouse.x, mouse.y);
            arm.draw(ctx);

            requestAnimationFrame(animate);
        }

        animate();
    </script>
