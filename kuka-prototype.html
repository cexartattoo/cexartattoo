<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>KUKA Arm Prototype</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

        body {
            margin: 0;
            overflow: hidden;
            background: #eaedf2;
            font-family: 'Orbitron', sans-serif;
        }

        canvas {
            display: block;
        }

        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #333;
            font-size: 14px;
            pointer-events: none;
        }
    </style>
</head>

<body>
    <div id="info">Mueve el ratón para controlar el brazo KUKA Prototype.<br>El diseño simula un robot industrial KUKA
        KR Quantec real sobre un séptimo eje (riel lineal).</div>
    <canvas id="cv"></canvas>

    <script>
        const cv = document.getElementById('cv');
        const ctx = cv.getContext('2d');
        let W, H;
        const mouse = { x: window.innerWidth / 2, y: window.innerHeight / 2 };

        window.addEventListener('resize', () => { W = cv.width = innerWidth; H = cv.height = innerHeight; });
        window.dispatchEvent(new Event('resize'));

        document.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });

        // Utils
        const clamp = (v, min, max) => Math.max(min, Math.min(max, v));
        const rrect = (c, x, y, w, h, r) => {
            c.beginPath(); c.moveTo(x + w - r, y); c.arcTo(x + w, y, x + w, y + h, r); c.arcTo(x + w, y + h, x, y + h, r);
            c.arcTo(x, y + h, x, y, r); c.arcTo(x, y, x + w, y, r); c.closePath();
        };

        // KUKA Colors
        const KUKA_ORANGE = '#f56300';
        const KUKA_ORANGE_DARK = '#cc5200';
        const KUKA_ORANGE_LIGHT = '#ff822a';
        const KUKA_BLACK = '#1a1a1a';
        const KUKA_GREY = '#444444';
        const SILVER = '#d0d4d8';

        class RealisticKukaArm {
            constructor() {
                this.L1 = Math.min(window.innerWidth, window.innerHeight) * 0.22;
                this.L2 = Math.min(window.innerWidth, window.innerHeight) * 0.18;
                this.by = window.innerHeight * 0.8;
                this.bx = window.innerWidth / 2;
                this.th1 = -Math.PI / 2;
                this.th2 = 0;
                this.th3 = 0;
                this.th4 = 0;

                // Track chain variables - Scaled up size
                this.linkLen = 36;
                this.updateChainLength();
            }

            updateChainLength() {
                // Phase 16: Apples-to-Apples Exact Tracking geometric constraint
                const maxCarX = (window.innerWidth * 0.9) + (160 / 2); // Furthest the carriage can travel right
                const anchorX = window.innerWidth * 0.05 + 210; // Cabinet right-side anchor

                // Max physical distance before breaking
                const maxDist = Math.abs(maxCarX - anchorX);

                // Semicircle arc loop length down to rail
                const topY = this.by - 35; // Moved up slightly to accommodate larger chain height
                const botY = this.by + 65;
                const radius = (botY - topY) / 2;
                const arcLen = Math.PI * radius;

                // Total geometric pixels needed
                const requiredPx = maxDist + arcLen;

                // Converting total pixels natively into exact required link units
                this.chainN = Math.ceil(requiredPx / this.linkLen);
            }

            ik(tx, ty) {
                this.L1 = Math.min(window.innerWidth, window.innerHeight) * 0.22;
                this.L2 = Math.min(window.innerWidth, window.innerHeight) * 0.18;
                this.by = window.innerHeight * 0.8;
                this.updateChainLength();

                const idealBx = clamp(tx, window.innerWidth * 0.1, window.innerWidth * 0.9);
                this.bx += (idealBx - this.bx) * 0.08;

                const TOOL_LENGTH = 90;
                const effective_L2 = this.L2 + TOOL_LENGTH;

                const dx = tx - (this.bx + 55);
                const dy = ty - (this.by - 110);
                const d = Math.hypot(dx, dy);

                const mx = this.L1 + effective_L2 - 2;
                const mn = Math.abs(this.L1 - effective_L2) + 2;
                const r = clamp(d, mn, mx);

                const sx = d > 0 ? (dx / d) * r : 0;
                const sy = d > 0 ? (dy / d) * r : -r;

                const c2 = (r * r - this.L1 * this.L1 - effective_L2 * effective_L2) / (2 * this.L1 * effective_L2);
                const th2Target = -Math.acos(clamp(c2, -1, 1));

                const k1 = this.L1 + effective_L2 * Math.cos(th2Target);
                const k2 = effective_L2 * Math.sin(th2Target);
                const th1Target = Math.atan2(sy, sx) - Math.atan2(k2, k1);

                this.th1 += (th1Target - this.th1) * 0.12;
                this.th2 += (th2Target - this.th2) * 0.12;

                const ex = (this.bx + 55) + Math.cos(this.th1) * this.L1;
                const ey = (this.by - 110) + Math.sin(this.th1) * this.L1;
                const wx = ex + Math.cos(this.th1 + this.th2) * this.L2;
                const wy = ey + Math.sin(this.th1 + this.th2) * this.L2;
                const toolTarget = Math.atan2(ty - wy, tx - wx);
                const th3Target = toolTarget - (this.th1 + this.th2);
                this.th3 += (th3Target - this.th3) * 0.2;
                this.th4 = this.th3 * 0.5;
            }

            drawDragChain(c) {
                // Restoring exact 4:48 PM Mathematical tracking loop [commit 05fad06]
                c.save();

                // RIGHT SIDE WALL ANCHOR
                const anchorX = window.innerWidth * 0.05 + 210; // Connect to cabinet right border
                // CARRIAGE RIGHT SIDE ANCHOR
                const carriageW = 160;
                const carX = this.bx + (carriageW / 2);

                const topY = this.by - 35; // Match new topY
                const botY = this.by + 65;
                const radius = (botY - topY) / 2;
                const cy = topY + radius;

                // Physical constraint mapping utilizing the dynamically computed length
                const L_geo = this.chainN * this.linkLen;

                let loopCenterX = (carX + anchorX - Math.PI * radius + L_geo) / 2;

                // Bound check tracking right.
                if (loopCenterX < carX + radius * 1.5) {
                    loopCenterX = carX + radius * 1.5;
                }

                const L1 = loopCenterX - carX;
                const L2 = Math.PI * radius;

                for (let i = 0; i < this.chainN; i++) {
                    const d = i * this.linkLen;
                    let x, y, ang;

                    if (d <= L1) {
                        x = carX + d;
                        y = topY;
                        ang = 0;
                    } else if (d > L1 && d <= L1 + L2) {
                        const u = (d - L1) / L2;
                        const a = -Math.PI / 2 + u * Math.PI;
                        x = loopCenterX + Math.cos(a) * radius;
                        y = cy + Math.sin(a) * radius;
                        ang = a + Math.PI / 2;
                    } else {
                        const d3 = d - (L1 + L2);
                        x = loopCenterX - d3;
                        y = botY;
                        ang = Math.PI;
                    }

                    c.save();
                    c.translate(x, y);
                    c.rotate(ang);

                    // Scaled up Industrial Thicker Aesthetics (36x24 vs 26x16)
                    c.fillStyle = '#1a1a1a';
                    rrect(c, -this.linkLen / 2, -12, this.linkLen, 24, 3);
                    c.fill();

                    c.fillStyle = '#3a3a3a';
                    c.fillRect(-this.linkLen / 2 + 1, -10, this.linkLen - 2, 3);

                    c.fillStyle = '#0f0f0f';
                    c.fillRect(-5, -6, 4, 12);
                    c.fillRect(3, -6, 4, 12);

                    c.restore();
                }
                c.restore();
            }

            drawLinearRail(c) {
                const railW = window.innerWidth * 0.9;
                const railH = 70;
                const rx = window.innerWidth * 0.05;
                const ry = this.by;

                c.fillStyle = '#2d2f33';
                c.fillRect(rx, ry, railW, railH);

                c.fillStyle = '#a0a5ad';
                c.fillRect(rx, ry + 15, railW, 8);
                c.fillRect(rx, ry + 40, railW, 20);

                c.fillStyle = '#444';
                for (let i = rx + 20; i < rx + railW - 20; i += 40) {
                    c.beginPath(); c.arc(i, ry + 50, 4, 0, Math.PI * 2); c.fill();
                }
            }

            drawCarriage(c) {
                const ry = this.by;
                const carriageW = 160;
                const cx = this.bx;

                c.save();
                c.fillStyle = '#111';
                c.fillRect(cx - (carriageW / 2), ry - 15, carriageW, 35);

                c.fillStyle = KUKA_ORANGE;
                rrect(c, cx - (carriageW / 2) - 10, ry - 15, 20, 35, 4); c.fill();
                rrect(c, cx + (carriageW / 2) - 10, ry - 15, 20, 35, 4); c.fill();

                c.fillStyle = '#222';
                c.fillRect(cx - (carriageW / 2) - 10, ry - 5, 25, 20);
                c.fillRect(cx + (carriageW / 2) - 15, ry - 5, 25, 20);

                c.fillStyle = KUKA_BLACK;
                const baseRad = carriageW * 0.35; // Wider base
                c.beginPath();
                // Pure straight cylinder instead of cone
                c.moveTo(cx - baseRad, ry - 15);
                c.lineTo(cx + baseRad, ry - 15);
                c.lineTo(cx + baseRad, ry - 120);
                c.lineTo(cx - baseRad, ry - 120);
                c.fill();

                const grd = c.createLinearGradient(cx - baseRad, 0, cx + baseRad, 0);
                grd.addColorStop(0, 'rgba(255,255,255,0.05)');
                grd.addColorStop(0.3, 'rgba(255,255,255,0.15)');
                grd.addColorStop(0.7, 'rgba(0,0,0,0.4)');
                grd.addColorStop(1, 'rgba(0,0,0,0.8)');
                c.fillStyle = grd;
                c.fill();

                // Orange Top Flange of the cylinder
                c.fillStyle = KUKA_ORANGE_DARK;
                rrect(c, cx - baseRad - 5, ry - 125, baseRad * 2 + 10, 20, 3);
                c.fill();

                // Front Servomotor detail (black/silver box)
                c.fillStyle = '#151515';
                c.fillRect(cx - baseRad - 40, ry - 80, 50, 60);
                c.strokeStyle = '#444'; c.lineWidth = 1;
                c.strokeRect(cx - baseRad - 40, ry - 80, 50, 60);

                // Silver components on servo box
                c.fillStyle = '#999';
                c.fillRect(cx - baseRad - 35, ry - 75, 40, 20);
                c.fillStyle = '#bbb';
                c.fillRect(cx - baseRad - 45, ry - 50, 15, 25); // Connector plug

                c.restore();
            }

            drawMotorDisc(c, x, y, radius, ang) {
                if (x < -20 || x > window.innerWidth + 20 || y < -20 || y > window.innerHeight + 20) {
                    return;
                }
                c.save();
                c.translate(x, y);

                c.beginPath(); c.arc(0, 0, radius, 0, Math.PI * 2);
                c.fillStyle = '#1a1a1a'; c.fill();

                c.beginPath(); c.arc(0, 0, radius * 0.88, 0, Math.PI * 2);
                c.strokeStyle = '#FF5500'; c.lineWidth = 3.5; c.stroke();

                c.rotate(ang);

                c.fillStyle = '#555555';
                for (let i = 0; i < 6; i++) {
                    const a = (i / 6) * Math.PI * 2;
                    c.beginPath();
                    c.arc(Math.cos(a) * radius * 0.72, Math.sin(a) * radius * 0.72, 2.5, 0, Math.PI * 2);
                    c.fill();
                }

                c.beginPath();
                c.moveTo(0, 0);
                c.lineTo(radius, 0);
                c.strokeStyle = '#fff';
                c.lineWidth = 2;
                c.stroke();

                c.restore();
            }

            drawLowerArm(c, x, y, len, ang, startW, endW) {
                if (x < -20 || x > window.innerWidth + 20 || y < -20 || y > window.innerHeight + 20) return;
                c.save();
                c.translate(x, y); c.rotate(ang);

                // Main body casting - massively wider at the base to envelop the shoulder joint
                c.beginPath();
                c.moveTo(0, -startW * 0.7);      // Much wider top
                c.lineTo(len * 0.2, -startW * 0.55);
                c.lineTo(len * 0.8, -endW * 0.45);
                c.lineTo(len, -endW * 0.4);
                c.lineTo(len, endW * 0.5);
                c.lineTo(len * 0.8, endW * 0.65);
                c.lineTo(len * 0.2, startW * 0.8); // Much wider bottom
                c.lineTo(0, startW * 0.7);
                c.closePath();

                // Base Orange
                c.fillStyle = '#FF6600';
                c.fill();

                // Highlight/Core casting
                c.beginPath();
                c.moveTo(0, -startW * 0.7);
                c.lineTo(len * 0.2, -startW * 0.55);
                c.lineTo(len * 0.8, -endW * 0.45);
                c.lineTo(len, -endW * 0.4);
                c.lineTo(len, -endW * 0.4 + 10);
                c.lineTo(len * 0.8, -endW * 0.45 + 10);
                c.lineTo(len * 0.2, -startW * 0.55 + 10);
                c.lineTo(0, -startW * 0.7 + 10);
                c.closePath();
                c.fillStyle = '#ff8833';
                c.fill();

                // Shadow casting
                c.beginPath();
                c.moveTo(0, startW * 0.7);
                c.lineTo(len * 0.2, startW * 0.8);
                c.lineTo(len * 0.8, endW * 0.65);
                c.lineTo(len, endW * 0.5);
                c.lineTo(len, endW * 0.5 - 15);
                c.lineTo(len * 0.8, endW * 0.65 - 15);
                c.lineTo(len * 0.2, startW * 0.8 - 15);
                c.lineTo(0, startW * 0.7 - 15);
                c.closePath();
                c.fillStyle = '#cc4400';
                c.fill();

                // Outline
                c.beginPath();
                c.moveTo(0, -startW * 0.7);
                c.lineTo(len * 0.2, -startW * 0.55);
                c.lineTo(len * 0.8, -endW * 0.45);
                c.lineTo(len, -endW * 0.4);
                c.lineTo(len, endW * 0.5);
                c.lineTo(len * 0.8, endW * 0.65);
                c.lineTo(len * 0.2, startW * 0.8);
                c.lineTo(0, startW * 0.7);
                c.closePath();
                c.strokeStyle = '#1a1a1a'; c.lineWidth = 2; c.stroke();

                // Structural Indentation web - adapted to new massive size
                c.fillStyle = '#1a1a1a';
                c.beginPath();
                c.moveTo(len * 0.15, -startW * 0.3);
                c.lineTo(len * 0.85, -endW * 0.2);
                c.lineTo(len * 0.85, endW * 0.3);
                c.lineTo(len * 0.15, startW * 0.4);
                c.closePath();
                c.fill();

                c.restore();
            }

            drawUpperArm(c, x, y, len, ang, startW, endW, nextX, nextY) {
                if (x < -20 || x > window.innerWidth + 20 || y < -20 || y > window.innerHeight + 20) return;
                c.save();
                c.translate(x, y); c.rotate(ang);

                // Main Tapered Body
                c.beginPath();
                c.moveTo(0, -startW * 0.5);
                c.lineTo(len, -endW * 0.4);
                c.lineTo(len, endW * 0.4);
                c.lineTo(0, startW * 0.5);
                c.closePath();
                c.fillStyle = '#FF6600';
                c.fill();

                // Highlight
                c.beginPath();
                c.moveTo(0, -startW * 0.5);
                c.lineTo(len, -endW * 0.4);
                c.lineTo(len, -endW * 0.4 + 8);
                c.lineTo(0, -startW * 0.5 + 8);
                c.closePath();
                c.fillStyle = '#ff8833';
                c.fill();

                // Shadow
                c.beginPath();
                c.moveTo(0, startW * 0.5);
                c.lineTo(len, endW * 0.4);
                c.lineTo(len, endW * 0.4 - 12);
                c.lineTo(0, startW * 0.5 - 12);
                c.closePath();
                c.fillStyle = '#cc4400';
                c.fill();

                // Outline
                c.beginPath();
                c.moveTo(0, -startW * 0.5);
                c.lineTo(len, -endW * 0.4);
                c.lineTo(len, endW * 0.4);
                c.lineTo(0, startW * 0.5);
                c.closePath();
                c.strokeStyle = '#1a1a1a'; c.lineWidth = 2; c.stroke();

                // Logo text ING.CESAR correctly aligned to taper
                c.save();
                c.fillStyle = '#111';
                // Font size scales with the thinnest part
                c.font = `900 ${endW * 0.4}px 'Orbitron', sans-serif`;
                c.textAlign = 'center'; c.textBaseline = 'middle';

                let rawAngle = Math.atan2(nextY - y, nextX - x);
                let displayAngle = 0;
                if (rawAngle > Math.PI / 2 || rawAngle < -Math.PI / 2) {
                    displayAngle = Math.PI;
                }

                // Follow the center line
                c.translate(len * 0.5, 0);
                c.rotate(-ang + rawAngle + displayAngle);

                // Add slight offset depending on where it's facing to stay vertically aligned visually
                c.fillText("ING.CESAR", 0, 0);
                c.restore();

                c.restore();
            }

            drawWristAndTorch(c, x, y, ang) {
                if (x < -20 || x > window.innerWidth + 20 || y < -20 || y > window.innerHeight + 20) return;
                c.save();
                c.translate(x, y); c.rotate(ang);

                // --- Silver/Grey Cylindrical Wrist (Shortened) ---
                c.fillStyle = '#b0b5bg'; // Base silver
                c.strokeStyle = '#555';
                c.lineWidth = 1;

                // Base flange connected to arm
                c.beginPath();
                c.rect(-8, -25, 16, 50);
                c.fill(); c.stroke();

                // Cylindrical extension (Noticeably shorter now: 15px instead of 25px)
                const grd = c.createLinearGradient(0, -20, 0, 20);
                grd.addColorStop(0, '#888');
                grd.addColorStop(0.5, '#ddd');
                grd.addColorStop(1, '#666');
                c.fillStyle = grd;

                c.beginPath();
                c.rect(8, -20, 15, 40);
                c.fill(); c.stroke();

                // New Grey Connector Block before the gripper
                c.fillStyle = '#666';
                c.beginPath();
                c.rect(23, -22, 12, 44);
                c.fill(); c.stroke();


                // --- Industrial Gripper (based on reference) ---
                // Orange base plate of the tool (Super wide now)
                c.fillStyle = '#FF6600';
                c.strokeStyle = '#111';
                c.lineWidth = 2;
                c.beginPath();
                c.rect(35, -60, 20, 120); // Much taller to allow wider finger spread
                c.fill(); c.stroke();

                // 3 Black Gripper Fingers / Modules (Spaced further apart)
                c.fillStyle = '#111';
                c.strokeStyle = '#333';
                c.lineWidth = 1;

                const fingerL = 65; // Longer jaws
                const fingerW = 20; // Thicker jaws
                const fingerGap = 20; // Massive gap between jaws
                const startY = -60 + 8;

                for (let i = 0; i < 3; i++) {
                    let fy = startY + i * (fingerW + fingerGap);

                    // Main black block
                    c.fillRect(55, fy, fingerL, fingerW);
                    c.strokeRect(55, fy, fingerL, fingerW);

                    // Inner metallic rail/detail
                    c.fillStyle = '#555';
                    c.fillRect(55, fy + 2, fingerL - 4, 3);
                    c.fillRect(55, fy + fingerW - 5, fingerL - 4, 3);
                }

                c.restore();
            }

            drawDynamicCables(c, cx, cy, ex, ey, wx, wy, th1, th2) {
                if (cx < -200 || cx > window.innerWidth + 200) return;
                c.save();
                c.lineCap = 'round';
                c.lineJoin = 'round';

                const cableW = 16; // Thicker cable
                c.strokeStyle = '#151515';
                c.lineWidth = cableW;

                // 1. Lower cable (Base Carriage to Front of L1)
                c.beginPath();
                // Lower origin from the front servo block area
                const start1X = this.bx - 60; 
                const start1Y = this.by - 60;
                
                // Enters L1 lower, snug against the front mass
                const entry1X = cx + Math.cos(th1 - Math.PI/8) * 45; 
                const entry1Y = cy + Math.sin(th1 - Math.PI/8) * 45;

                c.moveTo(start1X, start1Y);
                // Loop drops slightly then tightly hugs the shoulder
                c.bezierCurveTo(this.bx, this.by - 20, cx + 10, cy + 30, entry1X, entry1Y);
                c.stroke();

                // 2. The Pronounced ELBOW LOOP (From L1, over the elbow, into L2 rear)
                c.beginPath();
                
                // Exit point on L1 - higher and deeper to match thick arm
                const exit1X = ex - Math.cos(th1) * 80 - Math.cos(th1 - Math.PI/2) * 20;
                const exit1Y = ey - Math.sin(th1) * 80 - Math.sin(th1 - Math.PI/2) * 20;

                // Entry point on the back of L2 - tighter into the back orange casting
                const end1X = ex + Math.cos(th1 + th2 + Math.PI) * 50 - Math.cos(th1 + th2 - Math.PI/2) * 15;
                const end1Y = ey + Math.sin(th1 + th2 + Math.PI) * 50 - Math.sin(th1 + th2 - Math.PI/2) * 15;

                // Tighter control points for a neat, industrial arc rather than a floppy loose hose
                const cp1x = exit1X - Math.cos(th1 - Math.PI/2) * 60; 
                const cp1y = exit1Y - Math.sin(th1 - Math.PI/2) * 60;
                
                const cp2x = end1X + Math.cos(th1 + th2 + Math.PI) * 60 - Math.cos(th1 + th2 - Math.PI/2) * 60;
                const cp2y = end1Y + Math.sin(th1 + th2 + Math.PI) * 60 - Math.sin(th1 + th2 - Math.PI/2) * 60;

                c.moveTo(exit1X, exit1Y);
                c.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, end1X, end1Y);
                c.stroke();

                // Add corrugated texture
                c.strokeStyle = '#2a2a2a';
                c.lineWidth = cableW;
                c.setLineDash([3, 5]);

                c.beginPath(); 
                c.moveTo(start1X, start1Y); 
                c.bezierCurveTo(this.bx, this.by - 20, cx + 10, cy + 30, entry1X, entry1Y);
                c.stroke();

                c.beginPath();
                c.moveTo(exit1X, exit1Y);
                c.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, end1X, end1Y);
                c.stroke();

                c.restore();
            }

            drawHarnessCablesL2(c, ex, ey, wx, wy, th1, th2, segW) {
                if (ex < -200 || ex > window.innerWidth + 200) return;

                c.save();
                c.lineCap = 'round';
                c.lineJoin = 'round';

                const offsets = [segW * 0.55, segW * 0.65, segW * 0.75];

                const ang = th1 + th2;
                const nx = Math.cos(ang - Math.PI / 2);
                const ny = Math.sin(ang - Math.PI / 2);

                for (let k = 0; k < 3; k++) {
                    const P0x = ex + nx * (offsets[k] - 20);
                    const P0y = ey + ny * (offsets[k] - 20);
                    const P2x = wx + nx * offsets[k] * 0.5;
                    const P2y = wy + ny * offsets[k] * 0.5;

                    const midX = (P0x + P2x) / 2 + nx * 8;
                    const midY = (P0y + P2y) / 2 + ny * 8;

                    c.beginPath();
                    c.moveTo(P0x, P0y);
                    c.quadraticCurveTo(midX, midY, P2x, P2y);

                    c.strokeStyle = '#111111';
                    c.lineWidth = 3.5;
                    c.stroke();

                    c.strokeStyle = '#2a2a2a';
                    c.lineWidth = 1;
                    c.stroke();
                }

                c.restore();
            }

            drawControlCabinet(c) {
                const boxW = 210;
                const boxH = 150;
                const cabinetX = window.innerWidth * 0.05 + 10;
                const cabinetY = this.by + 65 - boxH;

                c.save();
                c.fillStyle = '#2a2a2a';
                rrect(c, cabinetX, cabinetY, boxW, boxH, 4);
                c.fill();

                c.fillStyle = '#FF6600';
                const panelX = cabinetX + 35;
                const panelY = cabinetY + 5;
                const panelW = boxW - 40;
                const panelH = boxH - 20;
                c.fillRect(panelX, panelY, panelW, panelH);

                c.fillStyle = '#111';
                c.fillRect(panelX + 20, panelY + 15, 60, 25);
                c.fillStyle = '#ff3333'; c.beginPath(); c.arc(panelX + 30, panelY + 27, 3, 0, Math.PI * 2); c.fill();
                c.fillStyle = '#ffcc00'; c.beginPath(); c.arc(panelX + 45, panelY + 27, 3, 0, Math.PI * 2); c.fill();
                const pulse = (Math.sin(Date.now() * 0.005) + 1) / 2;
                c.save();
                c.fillStyle = `rgba(51, 255, 51, ${0.4 + pulse * 0.6})`;
                c.shadowColor = '#33ff33';
                c.shadowBlur = 4 + (pulse * 8);
                c.beginPath(); c.arc(panelX + 60, panelY + 27, 3, 0, Math.PI * 2); c.fill();
                c.restore();

                c.fillStyle = '#111';
                rrect(c, panelX + 7, panelY + 70, 12, 45, 2);
                c.fill();

                c.fillStyle = '#111';
                c.font = '900 30px "Orbitron", sans-serif';
                c.textAlign = 'left';
                c.textBaseline = 'alphabetic';
                c.fillText("KUKA", panelX + 30, panelY + panelH - 15);

                c.fillStyle = '#fff';
                c.strokeStyle = '#000'; c.lineWidth = 1;
                c.fillRect(panelX + 115, panelY + 68, 45, 25);
                c.strokeRect(panelX + 115, panelY + 68, 45, 25);
                c.fillStyle = '#000';
                c.font = 'bold 9px sans-serif'; c.textAlign = 'center'; c.textBaseline = 'alphabetic';
                c.fillText("KUKA", panelX + 137, panelY + 79);
                c.font = '7px sans-serif';
                c.fillText("KR C4", panelX + 137, panelY + 89);

                const triX = panelX + 138;
                const triY = panelY + 38;
                c.fillStyle = '#FFD700';
                c.strokeStyle = '#000'; c.lineWidth = 2; c.lineJoin = 'miter';
                c.beginPath();
                c.moveTo(triX, triY - 18);
                c.lineTo(triX + 20, triY + 14);
                c.lineTo(triX - 20, triY + 14);
                c.closePath();
                c.fill(); c.stroke();
                c.fillStyle = '#000';
                c.font = 'bold 22px sans-serif';
                c.textAlign = 'center';
                c.textBaseline = 'middle';
                c.fillText("!", triX, triY + 4);

                c.fillStyle = '#111';
                c.beginPath();
                c.moveTo(panelX + panelW - 5, panelY + panelH - 60);
                c.lineTo(panelX + panelW + 15, panelY + panelH - 60);
                c.lineTo(panelX + panelW + 15, panelY + panelH - 10);
                c.lineTo(panelX + panelW - 5, panelY + panelH - 10);
                c.fill();

                c.translate(cabinetX + boxW - 5, cabinetY + boxH - 60);
                c.rotate(Math.PI / 16);
                c.fillStyle = '#333';
                rrect(c, -20, 0, 50, 65, 8); c.fill();
                c.fillStyle = '#222';
                rrect(c, -18, 2, 46, 61, 6); c.fill();
                c.fillStyle = KUKA_ORANGE;
                c.fillRect(-16, 4, 42, 57);
                // Animated SmartPAD Screen
                c.save();
                c.beginPath();
                c.rect(-12, 15, 34, 35);
                c.clip();

                c.fillStyle = '#0a192f';
                c.fillRect(-12, 15, 34, 35);

                const t2 = Date.now() * 0.002;
                c.fillStyle = 'rgba(0, 255, 204, 0.4)';
                for (let i = 0; i < 3; i++) {
                    let yOffset = ((t2 * 20 + i * 15) % 40);
                    c.fillRect(-8, 50 - yOffset, 12, 4);
                }

                c.strokeStyle = '#00ffcc';
                c.lineWidth = 1;
                c.beginPath();
                for (let lx = 0; lx < 34; lx += 2) {
                    let ly = 32 + Math.sin((lx * 0.2) - (t2 * 2)) * 6;
                    if (lx === 0) c.moveTo(-12 + lx, ly);
                    else c.lineTo(-12 + lx, ly);
                }
                c.stroke();
                c.restore();
                c.fillStyle = '#111';
                c.beginPath(); c.arc(15, 8, 5, 0, Math.PI * 2); c.fill();
                c.fillStyle = 'red';
                c.beginPath(); c.arc(15, 8, 3.5, 0, Math.PI * 2); c.fill();

                c.restore();
            }

            draw(c) {
                this.drawLinearRail(c);
                this.drawDragChain(c);
                this.drawCarriage(c);

                // Shoulder Base Offset - True kinematics origin Shift
                // The actual robot's shoulder is not dead center on the black drum.
                // It mounts to a massive orange cast housing extending horizontally.
                const baseRadius = 160 * 0.35; // This matches baseRad from drawCarriage
                const shoulderOffsetX = 35; // Shift to the right (forward)

                // Draw the orange offset casting rotating on top of the black drum
                c.save();
                c.fillStyle = '#FF6600';
                c.strokeStyle = '#1a1a1a';
                c.lineWidth = 2;
                c.beginPath();

                // Draw wide base on top of pedastal, tapering to the shoulder joint
                const cx_base = this.bx;
                const cy_base = this.by - 120; // Top of the black cylinder

                c.moveTo(cx_base - baseRadius + 10, cy_base);
                c.lineTo(cx_base + baseRadius - 10, cy_base);
                // Curve up and forward to wrap around the shoulder joint
                c.bezierCurveTo(cx_base + baseRadius, cy_base - 50, cx_base + shoulderOffsetX + 60, cy_base - 60, cx_base + shoulderOffsetX + 40, cy_base - 100);
                c.lineTo(cx_base - 30, cy_base - 100);
                c.bezierCurveTo(cx_base - baseRadius, cy_base - 60, cx_base - baseRadius + 5, cy_base - 20, cx_base - baseRadius + 10, cy_base);

                c.fill(); c.stroke();

                // Add shading to make it look cast
                c.clip();
                c.fillStyle = 'rgba(0,0,0,0.3)';
                c.beginPath(); c.arc(cx_base - 20, cy_base - 100, 80, 0, Math.PI * 2); c.fill();
                c.restore();

                // Now redefine the IK base origin (cx, cy) to use this new offset position
                // cy used to be this.by - 110. Now it's slightly higher and pushed right.
                const cx = this.bx + shoulderOffsetX;
                const cy = this.by - 130;  // Moved up 20px

                // Since we shifted cx/cy, we need to completely recalculate the IK end points
                // We're essentially resolving the forward kinematics here based on IK angles
                const ex = cx + Math.cos(this.th1) * this.L1;
                const ey = cy + Math.sin(this.th1) * this.L1;
                const wx = ex + Math.cos(this.th1 + this.th2) * this.L2;
                const wy = ey + Math.sin(this.th1 + this.th2) * this.L2;

                const segW = 55;

                // --- 1. Draw Rear J2 (Shoulder Area) ---
                this.drawMotorDisc(c, cx - 4, cy + 3, segW * 0.72, this.th1);

                // --- 2. Orange base bracket embracing stack (Now properly positioned) ---
                c.save();
                c.translate(cx, cy);
                c.rotate(this.th1);
                c.fillStyle = '#FF6600';
                c.strokeStyle = '#1a1a1a'; c.lineWidth = 2;
                c.beginPath(); c.roundRect(-segW * 0.6, -segW * 0.75, segW * 1.2, segW * 0.2, 4); c.fill(); c.stroke();
                c.beginPath(); c.roundRect(-segW * 0.6, segW * 0.55, segW * 1.2, segW * 0.2, 4); c.fill(); c.stroke();
                c.restore();

                // --- 3. Lower Arm L1 ---
                // Base is much wider (segW * 1.5) than the elbow (segW * 0.7)
                this.drawLowerArm(c, cx, cy, this.L1, this.th1, segW * 1.5, segW * 0.7);

                // --- 4. Middle J3 ---
                this.drawMotorDisc(c, cx - 2, cy + 1, segW * 0.63, this.th1 + this.th2);

                // --- 5. Front J4 ---
                this.drawMotorDisc(c, cx, cy, segW * 0.54, this.th1 + this.th2 + this.th3);

                // --- ELBOW JOINT 3-STACK REFACTOR (Rear Extension & Motors) ---
                this.drawMotorDisc(c, ex - 4, ey + 3, segW * 0.68, this.th1 + this.th2);

                c.save();
                c.translate(ex - 2, ey + 1);
                c.rotate(this.th1 + this.th2);

                // 1. Rear Orange Casting (extending behind the elbow)
                c.fillStyle = '#FF6600';
                c.strokeStyle = '#1a1a1a'; c.lineWidth = 2;
                c.beginPath();
                // Draw a wedge/block extending to the left (negative X)
                c.moveTo(0, -segW * 0.4);
                c.lineTo(-segW * 1.5, -segW * 0.6);
                c.lineTo(-segW * 1.5, segW * 0.7);
                c.lineTo(0, segW * 0.5);
                c.closePath();
                c.fill(); c.stroke();

                // 2. The 3 Black Motor/Counterweight Blocks
                const motorW = segW * 1.8;
                const motorH = segW * 0.35;
                const gap = segW * 0.1;
                const startY = -motorH * 1.5 - gap;
                // Shifted even further right to sit completely flush against the back casting
                const offsetX = -segW * 0.95;

                c.fillStyle = '#111';
                c.strokeStyle = '#333';
                c.lineWidth = 1;

                for (let i = 0; i < 3; i++) {
                    let my = startY + i * (motorH + gap);
                    // Base black block
                    c.fillRect(offsetX - motorW, my, motorW, motorH);
                    c.strokeRect(offsetX - motorW, my, motorW, motorH);

                    // Ribbed details (horizontal lines)
                    c.save();
                    c.strokeStyle = '#222';
                    c.beginPath();
                    c.moveTo(offsetX - motorW + 5, my + motorH * 0.33);
                    c.lineTo(offsetX - 5, my + motorH * 0.33);
                    c.moveTo(offsetX - motorW + 5, my + motorH * 0.66);
                    c.lineTo(offsetX - 5, my + motorH * 0.66);
                    c.stroke();
                    c.restore();

                    // Front silver cap/screws
                    c.fillStyle = '#888';
                    c.fillRect(offsetX - 8, my + 4, 8, motorH - 8);
                }

                c.restore();

                this.drawMotorDisc(c, ex - 2, ey + 1, segW * 0.60, this.th1 + this.th2 + this.th3);

                // Upper Arm L2 (Forearm)
                // Note: starts thick at elbow (segW * 0.9), tapers to thin at wrist (segW * 0.45)
                this.drawUpperArm(c, ex, ey, this.L2, this.th1 + this.th2, segW * 0.9, segW * 0.45, wx, wy);

                // Harness
                this.drawHarnessCablesL2(c, ex, ey, wx, wy, this.th1, this.th2, segW);

                this.drawMotorDisc(c, ex, ey, segW * 0.52, this.th1 + this.th2 + this.th3 + this.th4);

                // Wrist Joint
                this.drawMotorDisc(c, wx, wy, segW * 0.42, this.th1 + this.th2 + this.th3);

                // Tool
                this.drawWristAndTorch(c, wx, wy, this.th1 + this.th2 + this.th3);

                // Cables L1 Internal
                this.drawDynamicCables(c, cx, cy, ex, ey, wx, wy, this.th1, this.th2);

                // Cabinet
                this.drawControlCabinet(c);
            }
        }

        const arm = new RealisticKukaArm();

        function animate() {
            ctx.clearRect(0, 0, W, H);

            // Grid background to give scale
            ctx.strokeStyle = '#dae0e8'; ctx.lineWidth = 1;
            for (let x = 0; x < W; x += 50) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
            for (let y = 0; y < H; y += 50) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }

            arm.ik(mouse.x, mouse.y);
            arm.draw(ctx);

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
