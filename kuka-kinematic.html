<!DOCTYPE html>

  <title>KUKA Arm - Kinematic SVG</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

    body {
      margin: 0;
      overflow: hidden;
      background: #eaedf2;
      font-family: 'Orbitron', sans-serif;
    }

    canvas {
      display: block;
      position: absolute;
      top: 0;
      left: 0;
    }

    #cv {
      z-index: 1;
    }

    #cv-overlay {
      z-index: 3;
      pointer-events: none;
    }

    #robot-svg-container {
      position: absolute;
      top: 0;
      left: 0;
      z-index: 2;
      pointer-events: none;
      transform-origin: top left;
    }

    #info {
      position: absolute;
      top: 10px;
      left: 10px;
      color: #333;
      font-size: 14px;
      pointer-events: none;
      z-index: 10;
    }
  </style>
</head>

  <script>
    const cv = document.getElementById('cv');
    const ctx = cv.getContext('2d');
    const cvOverlay = document.getElementById('cv-overlay');
    const ctxOverlay = cvOverlay.getContext('2d');
    let W, H;
    const mouse = { x: window.innerWidth / 2, y: window.innerHeight / 2 };

    window.addEventListener('resize', () => { W = cv.width = cvOverlay.width = innerWidth; H = cv.height = cvOverlay.height = innerHeight; });
    window.dispatchEvent(new Event('resize'));
    document.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });

    const clamp = (v, min, max) => Math.max(min, Math.min(max, v));
    const rrect = (c, x, y, w, h, r) => {
      c.beginPath(); c.moveTo(x + w - r, y); c.arcTo(x + w, y, x + w, y + h, r); c.arcTo(x + w, y + h, x, y + h, r);
      c.arcTo(x, y + h, x, y, r); c.arcTo(x, y, x + w, y, r); c.closePath();
    };

    const KUKA_ORANGE = '#f56300';
    const KUKA_BLACK = '#1a1a1a';

    // SVG Elements
    const svgContainer = document.getElementById('robot-svg-container');
    const kukaSvg = document.getElementById('kuka-svg');
    const eslabon1El = document.getElementById('eslabon1');
    const eslabon2El = document.getElementById('eslabon2');

    // SVG Reference Points (from viewBox coordinates)
    const SVG_SHOULDER = { x: 308, y: 247 };
    const SVG_ELBOW = { x: 119, y: 93 };
    const SVG_BASE_Y = 562;
    // L1 distance in SVG space
    const SVG_L1 = Math.hypot(SVG_ELBOW.x - SVG_SHOULDER.x, SVG_ELBOW.y - SVG_SHOULDER.y); // ~244

    class KukaKinematic {
      constructor() {
        this.by = 0;
        this.bx = 0;
        this.th1 = -Math.PI / 2;
        this.th2 = 0;
        this.svgScale = 1;
        this.linkLen = 36;
        this.chainN = 20;
      }

      updateLayout() {
        this.by = window.innerHeight * 0.8;
        // viewBox "-300 -400 1160 1410": base at SVG y=562 maps to screen y=this.by
        // pxPerUnit = this.by / (562 - (-400)) = this.by / 962
        const VB_Y = -400, VB_W = 1160;
        this.svgScale = this.by / (SVG_BASE_Y - VB_Y);
        this.updateChainLength();
      }

      updateChainLength() {
        const maxCarX = (window.innerWidth * 0.9) + 80;
        const anchorX = window.innerWidth * 0.05 + 210;
        const maxDist = Math.abs(maxCarX - anchorX);
        const topY = this.by - 35;
        const botY = this.by + 65;
        const radius = (botY - topY) / 2;
        const arcLen = Math.PI * radius;
        const requiredPx = maxDist + arcLen;
        this.chainN = Math.ceil(requiredPx / this.linkLen);
      }

      ik(tx, ty) {
        this.updateLayout();

        // El hombro esta desplazado (308-178)*scale px a la derecha del centro del carriage.
        // Posicionar el carriage para que el HOMBRO quede cerca del target X, no el carriage.
        const shoulderOffX = (SVG_SHOULDER.x - 178) * this.svgScale;
        const idealBx = clamp(tx - shoulderOffX, window.innerWidth * 0.1, window.innerWidth * 0.9);
        this.bx += (idealBx - this.bx) * 0.12;

        // Shoulder position in screen coords
        const sX = this.bx + shoulderOffX;
        const sY = this.by - (SVG_BASE_Y - SVG_SHOULDER.y) * this.svgScale;

        // IK target relative to shoulder
        const dx = tx - sX;
        const dy = ty - sY;
        const d = Math.hypot(dx, dy);

        // Arm lengths in screen space
        const L1_screen = SVG_L1 * this.svgScale;
        // L2 effective = distance from elbow to end-effector in SVG space
        // Elbow(215,300) to tool flange(499,300) = 284 SVG units in eslabon2 local
        const SVG_L2_LOCAL = 284;
        const L2_screen = SVG_L2_LOCAL * this.svgScale;

        const mx = L1_screen + L2_screen - 2;
        const mn = Math.abs(L1_screen - L2_screen) + 2;
        const r = clamp(d, mn, mx);

        const sx = d > 0 ? (dx / d) * r : 0;
        const sy = d > 0 ? (dy / d) * r : -r;

        const c2 = (r * r - L1_screen * L1_screen - L2_screen * L2_screen) / (2 * L1_screen * L2_screen);
        // ELBOW LEFT: positive acos
        const th2Target = Math.acos(clamp(c2, -1, 1));

        const k1 = L1_screen + L2_screen * Math.cos(th2Target);
        const k2 = L2_screen * Math.sin(th2Target);
        let th1Clamped = Math.atan2(sy, sx) - Math.atan2(k2, k1);

        // --- LIMITES DE ARTICULACIONES ---
        // Hombro (A1): -185 a +10 grados (no puede apuntar hacia abajo ni girar de mas)
        const TH1_MIN = -160 * Math.PI / 180;
        const TH1_MAX = 10 * Math.PI / 180;
        th1Clamped = clamp(th1Clamped, TH1_MIN, TH1_MAX);

        // Codo (A2): 0 a 155 grados (solo se dobla hacia un lado)
        const TH2_MIN = 0 * Math.PI / 180;
        const TH2_MAX = 180 * Math.PI / 180;
        const th2Clamped = clamp(th2Target, TH2_MIN, TH2_MAX);

        this.th1 += (th1Clamped - this.th1) * 0.12;
        this.th2 += (th2Clamped - this.th2) * 0.12;
      }

      updateSVGTransforms() {
        // Eslabon 1: rotates around shoulder(308,247) in SVG space
        // th1 is in radians from IK. Convert to degrees.
        // The original angle for eslabon1 in the static SVG was -140.826 deg
        // That corresponded to atan2(93-247, 119-308) = atan2(-154, -189) ~ -2.458 rad ~ -140.83 deg
        // Now th1 is the new absolute angle from IK
        const th1Deg = this.th1 * (180 / Math.PI);
        eslabon1El.setAttribute('transform',
          `translate(${SVG_SHOULDER.x}, ${SVG_SHOULDER.y}) rotate(${th1Deg})`);

        // Eslabon 2: rotates around elbow
        // Elbow position in SVG space:
        const elbowSvgX = SVG_SHOULDER.x + Math.cos(this.th1) * SVG_L1;
        const elbowSvgY = SVG_SHOULDER.y + Math.sin(this.th1) * SVG_L1;

        // The angle of eslabon2 in world space = th1 + th2
        // But eslabon2's local "forward" direction in its draft is along +X from (215,300)
        // So we need: translate(elbowSvg) rotate(worldAngleDeg) translate(-215, -300)
        const worldAngleDeg = (this.th1 + this.th2) * (180 / Math.PI);
        eslabon2El.setAttribute('transform',
          `translate(${elbowSvgX.toFixed(1)}, ${elbowSvgY.toFixed(1)}) rotate(${worldAngleDeg.toFixed(2)}) translate(-215, -300)`);
      }

      positionSVG() {
        // viewBox is "-300 -400 1160 1410"
        // This means SVG coordinate (0,0) is at pixel fraction (300/1160, 400/1410) inside the element
        // And the total SVG coordinate range is 1160 wide x 1410 tall
        const VB_X = -300, VB_Y = -400, VB_W = 1160, VB_H = 1410;

        // We want SVG coordinate (178, SVG_BASE_Y=562) to land at screen (this.bx, this.by)
        // pixelsPerSvgUnit = renderedWidth / VB_W  (uniform scaling)
        // We solve for renderedWidth such that the base stays proportional:
        // (SVG_BASE_Y - VB_Y) * scale_factor = this.by   (approximately)
        // scale_factor = renderedWidth / VB_W
        // renderedWidth = this.by * VB_W / (SVG_BASE_Y - VB_Y)
        const renderedWidth = this.by * VB_W / (SVG_BASE_Y - VB_Y);
        const renderedHeight = renderedWidth * VB_H / VB_W;
        const pxPerUnit = renderedWidth / VB_W;

        // SVG coord (178, 562) maps to pixel inside element:
        // px_x = (178 - VB_X) * pxPerUnit
        // px_y = (562 - VB_Y) * pxPerUnit
        // We want that pixel to land at screen (this.bx, this.by):
        const leftX = this.bx - (178 - VB_X) * pxPerUnit;
        const topY = this.by - (SVG_BASE_Y - VB_Y) * pxPerUnit;

        svgContainer.style.left = leftX + 'px';
        svgContainer.style.top = topY + 'px';
        kukaSvg.style.width = renderedWidth + 'px';
        kukaSvg.style.height = renderedHeight + 'px';

        // Also update svgScale for IK to use (pixels per SVG unit)
        this.svgScale = pxPerUnit;
      }

      drawLinearRail(c) {
        const railW = window.innerWidth * 0.9;
        const railH = 70;
        const rx = window.innerWidth * 0.05;
        const ry = this.by;
        c.fillStyle = '#2d2f33';
        c.fillRect(rx, ry, railW, railH);
        c.fillStyle = '#a0a5ad';
        c.fillRect(rx, ry + 15, railW, 8);
        c.fillRect(rx, ry + 40, railW, 20);
        c.fillStyle = '#444';
        for (let i = rx + 20; i < rx + railW - 20; i += 40) {
          c.beginPath(); c.arc(i, ry + 50, 4, 0, Math.PI * 2); c.fill();
        }
      }

      drawDragChain(c) {
        c.save();
        const anchorX = window.innerWidth * 0.05 + 210;
        const carriageW = 160;
        const carX = this.bx + (carriageW / 2);
        const topY = this.by - 35;
        const botY = this.by + 65;
        const radius = (botY - topY) / 2;
        const cy = topY + radius;
        const L_geo = this.chainN * this.linkLen;
        let loopCenterX = (carX + anchorX - Math.PI * radius + L_geo) / 2;
        if (loopCenterX < carX + radius * 1.5) loopCenterX = carX + radius * 1.5;
        const L1 = loopCenterX - carX;
        const L2 = Math.PI * radius;
        for (let i = 0; i < this.chainN; i++) {
          const d = i * this.linkLen;
          let x, y, ang;
          if (d <= L1) { x = carX + d; y = topY; ang = 0; }
          else if (d > L1 && d <= L1 + L2) {
            const u = (d - L1) / L2;
            const a = -Math.PI / 2 + u * Math.PI;
            x = loopCenterX + Math.cos(a) * radius;
            y = cy + Math.sin(a) * radius;
            ang = a + Math.PI / 2;
          } else { const d3 = d - (L1 + L2); x = loopCenterX - d3; y = botY; ang = Math.PI; }
          c.save(); c.translate(x, y); c.rotate(ang);
          c.fillStyle = '#1a1a1a';
          rrect(c, -this.linkLen / 2, -12, this.linkLen, 24, 3); c.fill();
          c.fillStyle = '#3a3a3a'; c.fillRect(-this.linkLen / 2 + 1, -10, this.linkLen - 2, 3);
          c.fillStyle = '#0f0f0f'; c.fillRect(-5, -6, 4, 12); c.fillRect(3, -6, 4, 12);
          c.restore();
        }
        c.restore();
      }

      drawControlCabinet(c) {
        const boxW = 210; const boxH = 150;
        const cabinetX = window.innerWidth * 0.05 + 10;
        const cabinetY = this.by + 65 - boxH;
        c.save();
        c.fillStyle = '#2a2a2a';
        rrect(c, cabinetX, cabinetY, boxW, boxH, 4); c.fill();
        c.fillStyle = '#FF6600';
        const panelX = cabinetX + 35; const panelY = cabinetY + 5;
        const panelW = boxW - 40; const panelH = boxH - 20;
        c.fillRect(panelX, panelY, panelW, panelH);
        c.fillStyle = '#111'; c.fillRect(panelX + 20, panelY + 15, 60, 25);
        c.fillStyle = '#ff3333'; c.beginPath(); c.arc(panelX + 30, panelY + 27, 3, 0, Math.PI * 2); c.fill();
        c.fillStyle = '#ffcc00'; c.beginPath(); c.arc(panelX + 45, panelY + 27, 3, 0, Math.PI * 2); c.fill();
        const pulse = (Math.sin(Date.now() * 0.005) + 1) / 2;
        c.save();
        c.fillStyle = `rgba(51, 255, 51, ${0.4 + pulse * 0.6})`;
        c.shadowColor = '#33ff33'; c.shadowBlur = 4 + (pulse * 8);
        c.beginPath(); c.arc(panelX + 60, panelY + 27, 3, 0, Math.PI * 2); c.fill();
        c.restore();
        c.fillStyle = '#111'; rrect(c, panelX + 7, panelY + 70, 12, 45, 2); c.fill();
        c.fillStyle = '#111'; c.font = '900 30px "Orbitron", sans-serif';
        c.textAlign = 'left'; c.textBaseline = 'alphabetic';
        c.fillText("KUKA", panelX + 30, panelY + panelH - 15);
        c.fillStyle = '#fff'; c.strokeStyle = '#000'; c.lineWidth = 1;
        c.fillRect(panelX + 115, panelY + 68, 45, 25);
        c.strokeRect(panelX + 115, panelY + 68, 45, 25);
        c.fillStyle = '#000'; c.font = 'bold 9px sans-serif'; c.textAlign = 'center'; c.textBaseline = 'alphabetic';
        c.fillText("KUKA", panelX + 137, panelY + 79);
        c.font = '7px sans-serif'; c.fillText("KR C4", panelX + 137, panelY + 89);
        const triX = panelX + 138; const triY = panelY + 38;
        c.fillStyle = '#FFD700'; c.strokeStyle = '#000'; c.lineWidth = 2; c.lineJoin = 'miter';
        c.beginPath(); c.moveTo(triX, triY - 18); c.lineTo(triX + 20, triY + 14); c.lineTo(triX - 20, triY + 14); c.closePath(); c.fill(); c.stroke();
        c.fillStyle = '#000'; c.font = 'bold 22px sans-serif'; c.textAlign = 'center'; c.textBaseline = 'middle'; c.fillText("!", triX, triY + 4);
        // SmartPAD
        c.fillStyle = '#111';
        c.beginPath(); c.moveTo(panelX + panelW - 5, panelY + panelH - 60);
        c.lineTo(panelX + panelW + 15, panelY + panelH - 60);
        c.lineTo(panelX + panelW + 15, panelY + panelH - 10);
        c.lineTo(panelX + panelW - 5, panelY + panelH - 10); c.fill();
        c.translate(cabinetX + boxW - 5, cabinetY + boxH - 60); c.rotate(Math.PI / 16);
        c.fillStyle = '#333'; rrect(c, -20, 0, 50, 65, 8); c.fill();
        c.fillStyle = '#222'; rrect(c, -18, 2, 46, 61, 6); c.fill();
        c.fillStyle = KUKA_ORANGE; c.fillRect(-16, 4, 42, 57);
        c.save(); c.beginPath(); c.rect(-12, 15, 34, 35); c.clip();
        c.fillStyle = '#0a192f'; c.fillRect(-12, 15, 34, 35);
        const t2 = Date.now() * 0.002;
        c.fillStyle = 'rgba(0, 255, 204, 0.4)';
        for (let i = 0; i < 3; i++) { let yOffset = ((t2 * 20 + i * 15) % 40); c.fillRect(-8, 50 - yOffset, 12, 4); }
        c.strokeStyle = '#00ffcc'; c.lineWidth = 1; c.beginPath();
        for (let lx = 0; lx < 34; lx += 2) {
          let ly = 32 + Math.sin((lx * 0.2) - (t2 * 2)) * 6;
          if (lx === 0) c.moveTo(-12 + lx, ly); else c.lineTo(-12 + lx, ly);
        } c.stroke(); c.restore();
        c.fillStyle = '#111'; c.beginPath(); c.arc(15, 8, 5, 0, Math.PI * 2); c.fill();
        c.fillStyle = 'red'; c.beginPath(); c.arc(15, 8, 3.5, 0, Math.PI * 2); c.fill();
        c.restore();
      }

      draw(c, cOverlay) {
        this.drawLinearRail(c);
        this.drawDragChain(c);
        // SVG handles the robot visuals
        this.positionSVG();
        this.updateSVGTransforms();
        // Gabinete se dibuja en el canvas overlay (z-index 3, encima del SVG)
        this.drawControlCabinet(cOverlay);
      }
    }

    const arm = new KukaKinematic();

    function animate() {
      ctx.clearRect(0, 0, W, H);
      ctxOverlay.clearRect(0, 0, W, H);
      // Grid background
      ctx.strokeStyle = '#dae0e8'; ctx.lineWidth = 1;
      for (let x = 0; x < W; x += 50) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
      for (let y = 0; y < H; y += 50) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }
      arm.ik(mouse.x, mouse.y);
      arm.draw(ctx, ctxOverlay);
      requestAnimationFrame(animate);
    }
    animate();
  </script>
</body>
